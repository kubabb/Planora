name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    if: hashFiles('package-lock.json') != ''

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

  skeleton-check:
    runs-on: ubuntu-latest
    if: hashFiles('package-lock.json') == ''
    steps:
      - name: Monorepo skeleton not yet initialized
        run: |
          echo "::notice::M1 (monorepo skeleton) not created yet — CI will activate after npm install"
          echo "Skipping CI — no package-lock.json found"
